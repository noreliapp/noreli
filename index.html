<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <p class="eyebrow">Study Space</p>
      <h1>Welcome back</h1>
      <p class="subtitle">Your all-in-one study dashboard.</p>
    </header>

    <main class="dashboard">
      <section class="card">
        <h2>Deadlines</h2>
        <p>Upcoming due dates will appear here.</p>
      </section>

      <section class="card">
        <h2>To-do</h2>
        <p>Your tasks will appear here.</p>
      </section>

      <section class="card">
        <h2>Notes</h2>
        <p>Your notes will appear here.</p>
      </section>

      <section class="card">
        <h2>Pomodoro</h2>
        <p>Your study timer will appear here.</p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
